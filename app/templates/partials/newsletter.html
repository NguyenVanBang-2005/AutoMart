<!-- Newsletter Banner -->
<section class="newsletter-banner">
 <div class="newsletter-container">
  <div class="newsletter-logo">
   <svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="52" height="52" rx="10" fill="rgba(249,115,22,0.15)"/>
    <text x="26" y="34" text-anchor="middle" font-size="26" fill="#f97316">🚗</text>
   </svg>
   <div class="newsletter-text">
    <h3>Nhận thông tin</h3>
    <p>Đăng ký để cập nhật tin tức mới về xe hàng ngày</p>
   </div>
  </div>
  <form class="newsletter-form" onsubmit="handleNewsletterSubmit(event)">
   <input type="email" class="newsletter-input" placeholder="Nhập địa chỉ email..." required>
   <button type="submit" class="btn btn-primary">Đăng ký</button>
  </form>
 </div>
</section>
