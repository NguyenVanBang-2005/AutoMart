<!-- Hero Section -->
<section class="hero">
 <div class="hero-container">
  <div class="hero-content">
   <h1 id="heroTitle">Tìm chiếc xe mơ ước của bạn</h1>
   <p id="heroSubtitle">Hàng nghìn xe đã qua sử dụng chất lượng cao, giá tốt nhất thị trường.<br>Cam kết xe chính chủ đầy đủ giấy tờ, đảm bảo pháp lý 100%.</p>
   <div class="hero-buttons">
    <button class="btn btn-primary btn-large" onclick="document.getElementById('cars').scrollIntoView({behavior:'smooth'})">

    </button>
    <button class="btn btn-secondary btn-large" onclick="tryOpenSellModal()">

    </button>
   </div>
  </div>
  <div class="hero-illustration">

    <rect x="38" y="116" width="6" height="14" rx="2" fill="#fca5a5" opacity="0.9"/>
