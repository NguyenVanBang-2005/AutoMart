<!-- Hero Section -->
<section class="hero">
 <div class="hero-container">
  <div class="hero-content">
   <h1 id="heroTitle">Tìm chiếc xe mơ ước của bạn</h1>
   <p id="heroSubtitle">Hàng nghìn xe đã qua sử dụng chất lượng cao, giá tốt nhất thị trường. Cam kết xe chính chủ, đảm bảo pháp lý 100%.</p>
   <div class="hero-buttons">
    <button class="btn btn-primary btn-large">
     <span class="icon-search"></span> Tìm xe ngay
    </button>
    <button class="btn btn-secondary btn-large" onclick="tryOpenSellModal()">
     <span class="icon-car"></span> Bán xe của bạn
    </button>
   </div>
  </div>
  <div class="search-box">
   <h3 class="search-title"><span class="icon-search"></span> Tìm kiếm nhanh</h3>
   <form id="searchForm" onsubmit="handleSearch(event)">
    <div class="search-grid">
     <div class="form-group">
      <label class="form-label">Hãng xe</label>
      <select class="form-control" id="brandSelect">
       <option value="">Tất cả hãng xe</option>
       <option>Toyota</option>
       <option>Honda</option>
       <option>Mazda</option>
       <option>Hyundai</option>
       <option>Kia</option>
       <option>Ford</option>
       <option>Mercedes</option>
       <option>BMW</option>
      </select>
     </div>
     <div class="form-group">
      <label class="form-label">Khoảng giá</label>
      <select class="form-control">
       <option value="">Tất cả mức giá</option>
       <option>Dưới 300 triệu</option>
       <option>300 - 500 triệu</option>
       <option>500 - 800 triệu</option>
       <option>800 triệu - 1 tỷ</option>
       <option>Trên 1 tỷ</option>
      </select>
     </div>
     <div class="form-group">
      <label class="form-label">Năm sản xuất</label>
      <select class="form-control">
       <option value="">Tất cả năm</option>
       <option>2024</option>
       <option>2023</option>
       <option>2022</option>
       <option>2021</option>
       <option>2020</option>
       <option>Trước 2020</option>
      </select>
     </div>
     <div class="form-group">
      <label class="form-label">Loại xe</label>
      <select class="form-control">
       <option value="">Tất cả loại xe</option>
       <option>Sedan</option>
       <option>SUV/CUV</option>
       <option>Hatchback</option>
       <option>Pickup</option>
       <option>MPV</option>
      </select>
     </div>
     <div class="form-group form-group-full">
      <button type="submit" class="btn btn-primary" style="width: 100%;">
       <span class="icon-search"></span> Tìm kiếm xe
      </button>
     </div>
    </div>
   </form>
  </div>
 </div>
</section>
