<!-- Hero Section -->
<section class="hero">
 <div class="hero-container">

   <div class="hero-buttons">

  </div>
  <div class="hero-illustration">

         style="width:320px; height:auto; object-fit:contain; drop-shadow(0 8px 32px rgba(0,0,0,0.3));">

 </div>
